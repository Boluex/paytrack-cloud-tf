name: Terraform CI/CD

on:
  pull_request:
    branches: [master]
    paths:
      - "environments/**"
      - "modules/**"
      - "lambda-src/**"
      - ".github/workflows/terraform.yml"

  push:
    branches: [master]
    paths:
      - "environments/**"
      - "modules/**"
      - "lambda-src/**"
      - ".github/workflows/terraform.yml"

  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to target"
        required: true
        type: choice
        options: [dev, staging, prod]
      action:
        description: "Action to run"
        required: true
        type: choice
        options: [plan, apply, destroy]

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.9.5"
  AWS_REGION: "us-east-1"

jobs:
  validate:
    name: Validate ${{ matrix.environment }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [dev, staging, prod]
    environment: ${{ matrix.environment }}
    defaults:
      run:
        working-directory: environments/${{ matrix.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "${{ env.TF_VERSION }}"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform format check
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init

      - name: Terraform validate
        run: terraform validate

      - name: Security scan with trivy
        uses: aquasecurity/trivy-action@0.17.0
        with:
          scan-type: config
          scan-ref: environments/${{ matrix.environment }}

  plan:
    name: Terraform Plan ${{ matrix.environment }}
    needs: validate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [dev, staging, prod]
    environment: ${{ matrix.environment }}-plan
    defaults:
      run:
        working-directory: environments/${{ matrix.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: terraform init

      - name: Terraform plan
        id: plan
        run: |
          terraform plan -input=false -no-color -out=tfplan \
            2> >(tee plan-stderr.log >&2) | tee plan-output.log
        continue-on-error: true

      - name: Post plan to PR
        uses: actions/github-script@v7
        if: steps.plan.outcome != 'failure'
        with:
          script: |
            const fs = require('fs');
            const env = "${{ matrix.environment }}";
            let output = fs.readFileSync('environments/' + env + '/plan-output.log', 'utf8');
            if (output.length > 60000) {
              output = output.slice(0, 60000) + "\n... (truncated)";
            }
            const body = `#### Terraform Plan — \`${env}\`\n<details><summary>Show plan</summary>\n\n\`\`\`\n${output}\n\`\`\`\n</details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Fail if plan errored
        if: steps.plan.outcome == 'failure'
        run: exit 1

  apply-dev:
    name: Apply dev
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: environments/dev
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: terraform init

      - name: Terraform apply
        run: terraform apply -input=false -auto-approve

  apply-staging:
    name: Apply staging
    needs: apply-dev
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: staging
    defaults:
      run:
        working-directory: environments/staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: terraform init

      - name: Terraform apply
        run: terraform apply -input=false -auto-approve

  apply-prod:
    name: Apply prod
    needs: apply-staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: prod
    defaults:
      run:
        working-directory: environments/prod
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: terraform init

      - name: Terraform apply
        run: terraform apply -input=false -auto-approve

  manual:
    name: Manual (${{ inputs.environment }} / ${{ inputs.action }})
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: environments/${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - run: terraform init
      - name: Plan
        if: inputs.action == 'plan'
        run: terraform plan -input=false
      - name: Apply
        if: inputs.action == 'apply'
        run: terraform apply -input=false -auto-approve
      - name: Destroy
        if: inputs.action == 'destroy'
        run: terraform destroy -input=false -auto-approve